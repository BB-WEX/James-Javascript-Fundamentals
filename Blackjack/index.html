<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Blackjack/style.css">
    <script src="/Blackjack/script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Blackjack</h1>
            <h2>Want to play a round?</h2>
            <div class="cardsDiv">
                <p>Cards: </p>
                <p id="cardsLocation"></p>
            </div>
            <div class="sumDiv">
                <p>Sum: </p>
                <p id="sumLocation"></p>
            </div>
            <div class="btns">
                <button id="start">START GAME</button>
                <button id="newCard">NEW CARD</button>
            </div>
            <div class="moneyDiv">
                <h3>Money: </h3>
                <p id="money">£200</p>
            </div>
        </div>
    </div>
</body>
</html>
