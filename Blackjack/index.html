<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Blackjack/style.css">
    <script src="/Blackjack/script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Blackjack</h1>
            <div class="topTxt"><h2 id="topText">Want to play a round?</h2></div>
            <div class="cardsDiv">
                <p>Cards: </p>
                <p id="cardsLocation"></p>
            </div>
            <div class="sumDiv">
                <p>Sum: </p>
                <p id="sumsLocation"></p>
            </div>
            <div class="btns">
                <button id="start">START GAME</button>
                <button id="newCard" class="">NEW CARD</button>
            </div>
            <div class="moneyDiv">
                <h3>Money: </h3>
                <p>£</p>
                <p id="money">200</p>
            </div>
            <p class="bet" >Bet: £ <input type="number" id="bet" min="10" max="200" step="10" value="20" placeholder="00" onkeydown="return false"></p>
            <p id="dealerOutput"></p>
        </div>
    </div>
</body>
</html>
